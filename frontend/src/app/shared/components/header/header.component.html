<header class="header" [class.header--scrolled]="scrolled">
  <div class="header__inner">
    <a routerLink="/" class="header__logo" (click)="closeMobileMenu()">
      <span class="header__logo-icon">🎮</span>
      <span class="header__logo-text">RetroTracker</span>
    </a>

    <nav class="header__nav" [class.header__nav--open]="mobileMenuOpen">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          class="header__link"
          (click)="closeMobileMenu()"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="header__actions">
      <a routerLink="/login" class="header__link header__link--auth">Sign In</a>
      <a routerLink="/register" class="header__cta">Sign Up</a>
      <button
        class="header__menu-btn"
        [class.header__menu-btn--open]="mobileMenuOpen"
        (click)="toggleMobileMenu()"
        aria-label="Toggle menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

@if (mobileMenuOpen) {
  <div class="header__overlay" (click)="closeMobileMenu()"></div>
}
