name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install 2>&1
      - run: npx eslint "backend/src/**/*.ts" || true
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retro_test
      - name: Run Migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retro_test
      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retro_test
          JWT_SECRET: ci-test-secret-key
      - name: Build
        run: npm run build
        working-directory: backend

  frontend:
    name: Frontend — Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install 2>&1
      - run: npm install @rolldown/binding-linux-x64-gnu --no-save 2>&1 || true
      - name: Test
        run: cd frontend && npx vitest run 2>&1
      - name: Build
        run: cd frontend && npx vite build 2>&1
